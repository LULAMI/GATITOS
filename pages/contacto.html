<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <title>Contacto · Miau Couture</title>
  </head>
  <body>

    <header>
      <div class="div-logo">
        <a class="logo" href="../index.html">🐾 Miau Couture</a>
      </div>
      <nav class="header-nav">
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="../index.html#productos">Productos</a></li>
          <li><a href="./contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1 class="titulo-contacto text-secondary">Contactanos 🐱</h1>

      <form
        class="form-contacto"
        action="https://formspree.io/f/xpwzgkvd"
        method="POST"
      >
        <div class="grupo-input">
          <label for="nombre">Tu nombre:</label>
          <input id="nombre" type="text" name="nombre" placeholder="Tu nombre" required />
        </div>

        <div class="grupo-input">
          <label for="email">Tu correo:</label>
          <input id="email" type="email" name="email" placeholder="tu@email.com" required />
        </div>

        <div class="grupo-input">
          <label for="mensaje">Tu mensaje:</label>
          <textarea id="mensaje" name="mensaje" rows="5" placeholder="¿En qué te podemos ayudar?" required></textarea>
        </div>

        <button class="btn bg-secondary text-dark" type="submit">Enviar mensaje 🐾</button>
      </form>
    </main>

    <footer>
      <p>📍 Buenos Aires, Argentina &nbsp;|&nbsp; 📧 contacto@miau-couture.com &nbsp;|&nbsp; 🕐 Lun–Vie 9:00–18:00</p>
      <p class="firma">Hecho con 🐾 por Ludmila Mariana Bravo Ruiz Diaz · Talento Tech Comisión 26123</p>
      <nav>
        <ul class="footer-list">
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="../index.html#productos">Productos</a></li>
          <li><a href="./contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </footer>

  </body>
</html>
