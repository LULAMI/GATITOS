<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <title>Contacto · Miau Couture</title>
  </head>
  <body>

    <header>
      <div class="div-logo">
        <a class="logo" href="../index.html">Miau Couture</a>
        <span class="subtitulo">Hablemos de moda felina</span>
      </div>
      <nav class="header-nav">
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="../index.html#productos">Productos</a></li>
          <li><a href="./contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1 class="titulo-contacto">Contactanos</h1>

      <form
        class="form-contacto"
        action="https://formspree.io/f/xpwzgkvd"
        method="POST"
      >
        <div class="grupo-input">
          <label for="nombre">Tu nombre:</label>
          <input id="nombre" type="text" name="nombre" placeholder="Tu nombre" required />
        </div>
        <div class="grupo-input">
          <label for="email">Tu correo:</label>
          <input id="email" type="email" name="email" placeholder="tu@email.com" required />
        </div>
        <div class="grupo-input">
          <label for="mensaje">Tu mensaje:</label>
          <textarea id="mensaje" name="mensaje" rows="5" placeholder="¿En qué te podemos ayudar?" required></textarea>
        </div>
        <button type="submit">Enviar mensaje 🐱</button>
      </form>
    </main>

    <footer>
      <p>Ubicación: Buenos Aires, Argentina</p>
      <p>Email: contacto@miau-couture.com</p>
      <p>Horario: Lunes a Viernes 9:00 - 18:00</p>
      <p class="firma">Hecho por Ludmila Mariana Bravo Ruiz Diaz - Talento Tech Comisión 26123</p>
      <nav class="footer-social">
        <a href="https://wa.me/5491112345678" target="_blank" rel="noopener" aria-label="WhatsApp" class="social-icon-link">
          <img src="../imagen/whatsapp.png" alt="WhatsApp" class="social-icon" />
        </a>
        <a href="https://instagram.com/miau.couture" target="_blank" rel="noopener" aria-label="Instagram" class="social-icon-link">
          <img src="../imagen/instagram.png" alt="Instagram" class="social-icon" />
        </a>
      </nav>
    </footer>

  </body>
</html>
